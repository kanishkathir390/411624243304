<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design Assignment</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: italic, sans-serif;
        padding:20px;
        background-color:white;
    }

    /* Mobile First Navbar */
    nav{
        display:flex;
        flex-direction:column;
        background-color:whitesmoke;
        padding:15px;
        border-radius:8px;
    }

    nav a{
        text-decoration:none;
        color:red;
        padding:10px;
        font-weight:bold;
    }

    nav a:hover{
        color:red;
    }

    /* Desktop Navbar */
    @media(min-width:768px){
        nav{
            flex-direction:row;
            gap:30px;
        }
    }

    h1{
        text-align:center;
        margin:25px 0;
        color:black;
    }

    /* Image */
    img{
        width:350px;
        background-color:black;
        max-width 100%;
        display:block;
        margin:20px auto;
        border-radius:20px;
    }

    /* Video */
    video{
        width:60vw;
        display:block;
        margin:20px auto;
        padding:10px;
        background-color:green;
        border-radius:10px;
    }

    /* Table */
    table{
        width:100%;
        border-collapse:collapse;
        margin-top:25px;
    }

    th,td{
        border:1px solid green;
        padding:12px;
        text-align:center;
    }

    th{
        background-color:green;
    }

    /* Button */
    button{
        display:block;
        margin:25px auto;
        padding:12px 25px;
        border:none;
        background-color:green;
        fontcolor:white;
        cursor:pointer;
        border-radius:5px;
        transition:0.3s;
        font-size:16px;
    }

    button:hover{
        background-color:white;
        transform:scale(1.05);
    }

    /* Grid - Desktop First */
    .grid-container{
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:10px;
        margin-top:30px;
    }

    .box{
        background-color:#dcdcdc;
        padding:25px;
        text-align:center;
        font-size:20px;
        font-weight:bold;
        border-radius:8px;
    }

    /* Mobile Layout */
    @media(max-width:767px){
        .grid-container{
            grid-template-columns:repeat(2,1fr);
        }
    }
</style>


</head>
<body>


<!-- Navigation Bar -->
<nav>
    <a href="https://www.google.com" target="_blank">Home</a>
    <a href="https://www.wikipedia.org" target="_blank">About</a>
    <a href="https://github.com" target="_blank">Contact</a>
</nav>

<!-- Heading -->
<h1>Ducati V4s Italian Motorcycle</h1>

<!-- Image -->
<img
    src="image.png"
    alt="Ducati V4s Italian Motorcycle">
</img>
<!-- Video -->
<video controls>
    <source src="ducati.mp4" type="video/mp4">
</video>

<!-- Table -->
<table>
    <tr>
        <th>1</th>
        <th>2</th>
        <th>3</th>
    </tr>
    <tr>
        <td>HTML</td>
        <td>Structure of Web Page</td>
        <td>Markup Language</td>
    </tr>
    <tr>
        <td>CSS</td>
        <td>Styles Web Page</td>
        <td>Design Language</td>
    </tr>
     <tr>
       <td>JS</td>
       <td>Adds Behavior</td>
       <td>Scripting Language</td>
   </tr>
</table>

<!-- Button -->
<button onclick="alert('Clicked Successfully!')">
    Confrim
</button>

<!-- Grid Section -->
<div class="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
</div>

</body>
</html>
